<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
           
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .card {
            border: none;
            border-radius: 1.2rem;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
            animation: fadeIn 0.8s ease-in-out;
        }
        .card-header {
            background: #2c3e50;
            color: #fff;
            text-align: center;
            padding: 2rem 1rem;
        }
        .card-header i {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            color: #f39c12;
        }
        .btn-custom {
            background: #f39c12;
            border: none;
            font-weight: 600;
            transition: all 0.3s ease-in-out;
        }
        .btn-custom:hover {
            background: #d35400;
            transform: translateY(-2px);
        }
        .form-control:focus, .form-select:focus {
            border-color: #f39c12;
            box-shadow: 0 0 0 0.2rem rgba(243, 156, 18, 0.3);
        }
        .card-footer {
            background: #f8f9fa;
            font-size: 0.95rem;
        }
        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <i class="bi bi-helmet"></i>
                    <h4 class="mb-0">Crear Cuenta</h4>
                    <small>Regístrate para unirte</small>
                </div>
                <div class="card-body p-4">

                    <form method="POST" action="{{ url_for('auth.registro') }}" enctype="multipart/form-data">
                        <div class="mb-3">
                            <label for="nombre" class="form-label fw-semibold">Nombre completo</label>
                            <input type="text" class="form-control" id="nombre" name="nombre" placeholder="Tu nombre" required>
                        </div>

                        <div class="mb-3">
                            <label for="correo" class="form-label fw-semibold">Correo electrónico</label>
                            <input type="email" class="form-control" id="correo" name="correo" placeholder="ejemplo@correo.com" required>
                        </div>

                        <div class="mb-3">
                            <label for="contraseña" class="form-label fw-semibold">Contraseña</label>
                            <input type="password" class="form-control" id="contraseña" name="contraseña" placeholder="••••••••" required>
                        </div>

                        <div class="mb-3">
                            <label for="rol" class="form-label fw-semibold">Rol</label>
                            <select class="form-select" name="rol" id="rol" required>
                                <option value="">Seleccione un rol</option>
                                <option value="usuario">Usuario</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="imagen" class="form-label fw-semibold">Foto de perfil (opcional)</label>
                            <input type="file" class="form-control" id="imagen" name="imagen" accept="image/*">
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-custom btn-lg">
                                Registrarse
                            </button>
                        </div>
                    </form>
                </div>

                <div class="card-footer text-center py-3">
                    <span>¿Ya tienes cuenta?</span>
                    <a href="{{ url_for('auth.login') }}" class="text-decoration-none fw-semibold text-dark">Inicia sesión</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
