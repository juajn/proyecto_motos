{% extends 'base.html' %}

{% block title %}Editar Producto{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-lg-8">
        <div class="card border-0 shadow-lg rounded-4">
            <!-- Header con gradiente -->
            <div class="card-header text-white py-3" style="background: linear-gradient(135deg, #343a40, #212529);">
                <h4 class="mb-0"><i class="fas fa-box-open me-2"></i> Editar Producto</h4>
            </div>

            <div class="card-body p-4">
                <!-- enctype para imágenes -->
                <form method="POST" enctype="multipart/form-data">
                    <div class="row">
                        <!-- Nombre -->
                        <div class="col-md-6 mb-3">
                            <label for="nombre" class="form-label fw-semibold">Nombre</label>
                            <input type="text" name="nombre" id="nombre" value="{{ producto.nombre }}" 
                                   class="form-control shadow-sm" placeholder="Nombre del producto" required>
                        </div>

                        <!-- Precio -->
                        <div class="col-md-6 mb-3">
                            <label for="precio" class="form-label fw-semibold">Precio</label>
                            <input type="number" step="0.01" name="precio" id="precio" value="{{ producto.precio }}" 
                                   class="form-control shadow-sm" placeholder="Ej: 29.99" required>
                        </div>

                        <!-- Stock -->
                        <div class="col-md-6 mb-3">
                            <label for="stock" class="form-label fw-semibold">Stock</label>
                            <input type="number" name="stock" id="stock" value="{{ producto.stock }}" 
                                   class="form-control shadow-sm" placeholder="Cantidad en inventario" required>
                        </div>

                        <!-- Categoría -->
                        <div class="col-md-6 mb-3">
                            <label for="categoria" class="form-label fw-semibold">Categoría</label>
                            <input type="text" name="categoria" id="categoria" value="{{ producto.categoria }}" 
                                   class="form-control shadow-sm" placeholder="Ej: Herramientas" required>
                        </div>

                        <!-- Descripción -->
                        <div class="col-12 mb-3">
                            <label for="descripcion" class="form-label fw-semibold">Descripción</label>
                            <textarea name="descripcion" id="descripcion" rows="3" 
                                      class="form-control shadow-sm" required>{{ producto.descripcion }}</textarea>
                        </div>

                        <!-- Imagen actual -->
                        <div class="col-12 mb-3">
                            <label class="form-label fw-semibold">Imagen actual</label><br>
                            {% if producto.foto %}
                                <img src="{{ url_for('static', filename='uploads/' ~ producto.foto) }}" 
                                     class="rounded shadow-sm border" width="100" alt="Imagen actual">
                            {% else %}
                                <span class="text-muted">No hay imagen</span>
                            {% endif %}
                        </div>

                        <!-- Nueva imagen -->
                        <div class="col-12 mb-4">
                            <label for="foto" class="form-label fw-semibold">Nueva Imagen (opcional)</label>
                            <input type="file" name="foto" id="foto" class="form-control shadow-sm" accept="image/*">
                        </div>
                    </div>

                    <!-- Botones -->
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('admin.listar_productos') }}" class="btn btn-outline-secondary rounded-pill px-4">
                            <i class="fas fa-arrow-left me-2"></i> Cancelar
                        </a>
                        <button type="submit" class="btn btn-dark rounded-pill px-4">
                            <i class="fas fa-save me-2"></i> Actualizar Producto
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Estilos adicionales -->
<style>
    .form-label {
        font-weight: 600;
        color: #343a40;
    }
    .form-control, textarea {
        border-radius: 0.5rem;
    }
    .card {
        border-radius: 1rem;
    }
</style>
{% endblock %}
