{% extends "base.html" %}
{% block content %}
<div class="container mt-5 pt-4">
    <h2 class="text-center mb-5 fw-bold text-dark">📊 Dashboard - Bienvenido {{ usuario.nombre }}</h2>

    <style>
        .grafico-tamano {
            height: 260px !important;
            max-width: 260px;
            margin: 0 auto;
        }
        .grafico-barra {
            height: 260px !important;
            width: 100% !important;
            margin: 0 auto;
        }
        .card-dashboard {
            border: none;
            border-radius: 15px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .card-dashboard:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }
        .card-header-custom {
            background: linear-gradient(135deg, #0d6efd, #0a58ca);
            color: white;
            font-weight: 600;
            text-align: center;
            border-radius: 15px 15px 0 0;
            padding: 0.75rem;
        }
        .modal-header {
            background: linear-gradient(135deg, #212529, #495057);
            color: white;
        }
        .btn {
            border-radius: 10px;
        }
    </style>

    <div class="row">
        <!-- Usuarios -->
        <div class="col-md-6 mb-4">
            <div class="card card-dashboard shadow-sm">
                <div class="card-header-custom">
                    Distribución de Usuarios
                </div>
                <div class="card-body text-center">
                    <canvas id="usuariosChart" class="grafico-tamano"></canvas>
                    <button class="btn btn-outline-primary mt-4 w-100 shadow-sm" data-bs-toggle="modal" data-bs-target="#modalRegistro">
                        <i class="fas fa-user-plus me-2"></i> Nuevo Usuario
                    </button>
                </div>
            </div>
        </div>

        <!-- Productos -->
        <div class="col-md-6 mb-4">
            <div class="card card-dashboard shadow-sm">
                <div class="card-header-custom">
                    Tipos de Productos
                </div>
                <div class="card-body text-center">
                    <canvas id="productosChart" class="grafico-barra"></canvas>
                    <button class="btn btn-outline-success mt-4 w-100 shadow-sm" data-bs-toggle="modal" data-bs-target="#modalProducto">
                        <i class="fas fa-box-open me-2"></i> Nuevo Producto
                    </button>
                </div>
            </div>
        </div>

        <!-- Trabajos -->
        <div class="col-md-12 mb-4">
            <div class="card card-dashboard shadow-sm">
                <div class="card-header-custom">
                    Trabajos Realizados Últimos 5 Días
                </div>
                <div class="card-body text-center">
                    <canvas id="trabajosChart" height="130" style="height: 160px;"></canvas>
                    <button class="btn btn-outline-warning mt-4 w-100 shadow-sm" data-bs-toggle="modal" data-bs-target="#modalTrabajo">
                        <i class="fas fa-tools me-2"></i> Nuevo Trabajo
                    </button>
                </div>
            </div>
        </div>

        <!-- Ventas -->
        <div class="col-md-12 mb-4">
            <div class="card card-dashboard shadow-sm">
                <div class="card-header-custom">
                    Ventas Últimos 7 Días
                </div>
                <div class="card-body text-center">
                    <canvas id="ventasChart" height="130" style="height: 160px;"></canvas>
                    <button class="btn btn-outline-info mt-4 w-100 shadow-sm" data-bs-toggle="modal" data-bs-target="#modalNuevaVenta">
                        <i class="fas fa-shopping-cart me-2"></i> Nueva Venta
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ========== MODALES ========== -->

<!-- Modal Usuario -->
<div class="modal fade" id="modalRegistro" tabindex="-1" aria-labelledby="modalRegistroLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content shadow-lg border-0 rounded-4">
      <form method="POST" action="{{ url_for('auth.registro') }}" enctype="multipart/form-data">
        <div class="modal-header">
          <h5 class="modal-title fw-bold" id="modalRegistroLabel"><i class="fas fa-user-plus me-2"></i> Registrar Usuario</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3"><label class="form-label">Nombre</label><input type="text" class="form-control" name="nombre" required></div>
          <div class="mb-3"><label class="form-label">Correo</label><input type="email" class="form-control" name="correo" required></div>
          <div class="mb-3"><label class="form-label">Contraseña</label><input type="password" class="form-control" name="contraseña" required></div>
          <div class="mb-3"><label class="form-label">Rol</label>
            <select name="rol" class="form-select">
              <option value="admin">Admin</option>
              <option value="mecanico">Mecánico</option>
              <option value="usuario">Usuario</option>
            </select>
          </div>
          <div class="mb-3"><label class="form-label">Imagen</label><input type="file" class="form-control" name="imagen"></div>
        </div>
        <div class="modal-footer">
          <button type="submit" class="btn btn-primary px-4">Registrar</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Modal Producto -->
<div class="modal fade" id="modalProducto" tabindex="-1" aria-labelledby="modalProductoLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content shadow-lg border-0 rounded-4">
      <form method="POST" action="{{ url_for('admin.crear_producto') }}" enctype="multipart/form-data">
        <div class="modal-header">
          <h5 class="modal-title fw-bold"><i class="fas fa-box-open me-2"></i> Nuevo Producto</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3"><label class="form-label">Nombre</label><input type="text" name="nombre" class="form-control" required></div>
          <div class="mb-3"><label class="form-label">Descripción</label><textarea name="descripcion" class="form-control"></textarea></div>
          <div class="mb-3"><label class="form-label">Precio</label><input type="number" step="0.01" name="precio" class="form-control" required></div>
          <div class="mb-3"><label class="form-label">Stock</label><input type="number" name="stock" class="form-control" required></div>
          <div class="mb-3"><label class="form-label">Categoría</label>
            <select name="categoria" class="form-select" required>
              <option value="">Seleccione una categoría</option>
              {% for cat in categorias %}<option value="{{ cat }}">{{ cat }}</option>{% endfor %}
            </select>
          </div>
          <div class="mb-3"><label class="form-label">Imagen</label><input type="file" name="imagen" class="form-control"></div>
        </div>
        <div class="modal-footer">
          <button type="submit" class="btn btn-success px-4">Guardar</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Modal Trabajo -->
<div class="modal fade" id="modalTrabajo" tabindex="-1" aria-labelledby="modalTrabajoLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content shadow-lg border-0 rounded-4">
      <form method="POST" action="{{ url_for('admin.crear_trabajo') }}" enctype="multipart/form-data">
        <div class="modal-header">
          <h5 class="modal-title fw-bold"><i class="fas fa-tools me-2"></i> Nuevo Trabajo</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3"><label class="form-label">Descripción</label><textarea name="descripcion" class="form-control" required></textarea></div>
          <div class="mb-3"><label class="form-label">Precio</label><input type="number" step="0.01" name="costo" class="form-control" required></div>
          <div class="mb-3"><label class="form-label">Estado</label>
            <select name="estado" class="form-select" required>
              <option value="pendiente">Pendiente</option>
              <option value="en proceso">En proceso</option>
              <option value="completado">Completado</option>
            </select>
          </div>
          <div class="mb-3"><label class="form-label">Mecánico</label>
            <select name="mecanico_id" class="form-select" required>
              {% for m in mecanicos %}<option value="{{ m.id }}">{{ m.nombre }}</option>{% endfor %}
            </select>
          </div>
          <div class="mb-3"><label class="form-label">Cliente</label>
            <select name="cliente_id" class="form-select" required>
              {% for c in clientes %}<option value="{{ c.id }}">{{ c.nombre }}</option>{% endfor %}
            </select>
          </div>
          <div class="mb-3"><label class="form-label">Foto</label><input type="file" name="foto" class="form-control" accept="image/*"></div>
        </div>
        <div class="modal-footer">
          <button type="submit" class="btn btn-warning px-4">Guardar</button>
        </div>
      </form>
    </div>
  </div>
</div>
<!-- ==================== MODAL NUEVA VENTA ==================== -->
<div class="modal fade" id="modalNuevaVenta" tabindex="-1" aria-hidden="true" style="width:1350px;">
  <div class="modal-dialog modal-lg modal-dialog-centered" style="max-width: 60%; margin: auto;">
    <div class="modal-content rounded-4 shadow">
      
      <!-- HEADER -->
      <div class="modal-header bg-dark text-white">
        <h5 class="modal-title"><i class="fas fa-plus me-2"></i> Registrar Nueva Venta</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>

      <!-- FORMULARIO -->
      <form method="POST" action="{{ url_for('admin.nueva_venta') }}">
        
        <!-- BODY con scroll -->
        <div class="modal-body" style="max-height: 60vh; overflow-y: auto;">
          
          <!-- Cliente -->
          <div class="mb-3">
            <label for="cliente_id" class="form-label">Cliente</label>
            <select name="cliente_id" id="cliente_id" class="form-select" required>
              <option value="">Seleccione un cliente</option>
              {% for cliente in clientes %}
                <option value="{{ cliente.id }}">{{ cliente.nombre }} ({{ cliente.correo }})</option>
              {% endfor %}
            </select>
          </div>

          <!-- Vendedor -->
          <div class="mb-3">
            <label for="vendedor_id" class="form-label">Vendedor</label>
            <select name="vendedor_id" id="vendedor_id" class="form-select" required>
              <option value="">Seleccione un vendedor</option>
              {% for vendedor in vendedores %}
                <option value="{{ vendedor.id }}">{{ vendedor.nombre }}</option>
              {% endfor %}
            </select>
          </div>

          <!-- Productos dinámicos -->
          <div class="mb-3">
            <label class="form-label">Productos</label>
            <div id="productos-container">
              <div class="row mb-2 producto-row">
                <div class="col-md-5">
                  <select name="productos[0][id]" class="form-select" required>
                    <option value="">Seleccione un producto</option>
                    {% for producto in productos %}
                      <option value="{{ producto.id }}">{{ producto.nombre }} - ${{ "%.2f"|format(producto.precio) }}</option>
                    {% endfor %}
                  </select>
                </div>
                <div class="col-md-3">
                  <input type="number" name="productos[0][cantidad]" class="form-control" min="1" value="1" required>
                </div>
                <div class="col-md-3">
                  <input type="number" name="productos[0][precio_unitario]" class="form-control" step="0.01" placeholder="Precio unitario" required>
                </div>
                <div class="col-md-1 d-flex align-items-center" style="justify-content: center;">
                  <button type="button" class="btn btn-danger btn-sm eliminar-producto">
                    <i class="fas fa-trash">Eliminar</i>
                  </button>
                </div>
              </div>
            </div>
            <button type="button" id="agregar-producto" class="btn btn-outline-dark btn-sm mt-2">
              <i class="fas fa-plus"></i> Agregar producto
            </button>
          </div>
        </div>

        <!-- FOOTER fijo -->
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
            <i class="fas fa-times"></i> Cancelar
          </button>
          <button type="submit" class="btn btn-success">
            <i class="fas fa-save me-1"></i> Guardar Venta
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
<!-- ==================== JS PARA PRODUCTOS DINÁMICOS ==================== -->
<script>
document.addEventListener("DOMContentLoaded", () => {
    let index = 1;
    const container = document.getElementById("productos-container");
    const btnAgregar = document.getElementById("agregar-producto");

    btnAgregar.addEventListener("click", () => {
        const row = document.querySelector(".producto-row").cloneNode(true);
        row.querySelectorAll("select, input").forEach(input => {
            const name = input.getAttribute("name");
            if (name) input.setAttribute("name", name.replace(/\[\d+\]/, `[${index}]`));
            if (input.tagName === "INPUT") input.value = "";
        });
        row.querySelector(".eliminar-producto").addEventListener("click", () => row.remove());
        container.appendChild(row);
        index++;
    });

    document.querySelectorAll(".eliminar-producto").forEach(btn => {
        btn.addEventListener("click", function() {
            if (document.querySelectorAll(".producto-row").length > 1) {
                this.closest(".producto-row").remove();
            }
        });
    });
});
</script>
<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  new Chart(document.getElementById('usuariosChart'), { type:'doughnut', data:{ labels: {{ roles|tojson }}, datasets:[{ data: {{ conteo_roles|tojson }}, backgroundColor:['#0d6efd','#20c997','#ffc107'] }] }, options:{ plugins:{ legend:{ position:'bottom' } } } });
  new Chart(document.getElementById('productosChart'), { type:'bar', data:{ labels: {{ categorias|tojson }}, datasets:[{ label:'Cantidad', data: {{ conteo_categorias|tojson }}, backgroundColor:['#20c997','#0d6efd','#6f42c1'] }] }, options:{ scales:{ y:{ beginAtZero:true } }, plugins:{ legend:{ display:false } } } });
  new Chart(document.getElementById('trabajosChart'), { type:'line', data:{ labels: {{ labels_fechas|tojson }}, datasets:[{ label:'Trabajos', data: {{ conteo_trabajos|tojson }}, borderColor:'#fd7e14', backgroundColor:'rgba(253,126,20,0.2)', fill:true, tension:0.4 }] }, options:{ plugins:{ legend:{ position:'bottom' } } } });
  new Chart(document.getElementById('ventasChart'), { type:'line', data:{ labels: {{ labels_ventas|tojson }}, datasets:[{ label:'Ventas', data: {{ conteo_ventas|tojson }}, borderColor:'#0d6efd', backgroundColor:'rgba(13,110,253,0.2)', fill:true, tension:0.4 }] }, options:{ plugins:{ legend:{ position:'bottom' } } } });
</script>

{% endblock %}
